---
- hosts: all
  name: setup frontend
  gather_facts: false
  become: true
  tasks:
    - name: copy mongo repo file
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongodb-org-7.0.repo

    - name: install package
      ansible.builtin.dnf:
        name: mongodb-org
        state: present

    - name: update bindIp
      ansible.builtin.shell: |
        sed -i "s/bindIp: 127.0.0.1/bindIp: 0.0.0.0/" /etc/mongod.conf

    - name: enable & start service
      ansible.builtin.systemd_service:
        name: mongod
        state: restarted
        enabled: yes
        deamon_reload: true