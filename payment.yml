---
- hosts: all
  name: setup payment service
  gather_facts: false
  become: true
  tasks: 
    - name: Install Python 3
      ansible.builtin.dnf:
        name:
          - python3
          - python3-pip
          - unzip

    - name: copy payment service
      ansible.builtin.copy:
        src: payment.service
        dest: /etc/systemd/system/payment.service

    - name: create app user
      ansible.builtin.user:
        name: appuser
        shell: /bin/false

    - name: create app direcotry
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        mode: o-rwx
        state: directory

    - name: download code
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/payment.zip
        dest: /app
        remote_src: yes

    - name: install dependencies
      ansible.builtin.shell: pip3 install -r requirements.txt
      args:
        chdir: /app      

    - name: start and enable service
      ansible.builtin.systemd_service:
        name: payment
        state: restarted
        enabled: yes
        daemon_reload: yes      