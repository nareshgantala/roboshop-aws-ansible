---
- hosts: all
  name: setup catalogue service
  gather_facts: false
  become: true
  tasks:
    - name: Install Go
      ansible.builtin.dnf:
        state: present
        name: 
          - golang
          - git
          - mysql8.4
          - unzip

    - name: copy systemd service
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: create app user
      ansible.builtin.user:
        name: appuser
        shell: /bin/false

    - name: create /app directory
      ansible.builtin.file:
        path: /app
        state: directory
        owner: appuser
        group: appuser
        mode: o-rwx

    - name: setup code
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/catalogue.zip
        dest: /app

    - name: build code
      ansible.builtin.shell: |
        go mod tidy
        CGO_ENABLED=0 go build -o /app/catalogue .
      args:
          chdir: /app

    - name: setup schema
      ansible.builtin.shell: mysql -h <MYSQL-SERVER-IP> -u root -pRoboShop@1 < db/schema.sql
      args:
          chdir: /app

    - name: setup app user schema
      ansible.builtin.shell: mysql -h <MYSQL-SERVER-IP> -u root -pRoboShop@1 < db/app-user.sql
      args:
          chdir: /app

    - name: setup mater data schema
      ansible.builtin.shell: mysql -h <MYSQL-SERVER-IP> -u root -pRoboShop@1 catalogue < db/master-data.sql
      args:
          chdir: /app

    - name: start and enable service
      ansible.builtin.systemd_service:
        name: catalogue
        state: restarted
        enabled: yes
        deamon_reload: yes

        